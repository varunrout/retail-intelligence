name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Build sample data
        # Generate a tiny synthetic dataset and build the DuckDB marts so the
        # data-dependent tests actually run on CI and prove a clone reproduces
        # the pipeline end to end.
        run: python -m src.data.build --scale sample
      - name: Test
        run: pytest --cov=src --cov-report=term-missing
      - name: Coverage gate (src/features, src/models)
        # Feature builders and trainers had zero test coverage; this fails the
        # build if that regresses below 60%. src/data (loaders/validators) and
        # src/data/generate.py are covered separately, above.
        run: pytest --cov=src.features --cov=src.models --cov-report=term-missing --cov-fail-under=60 -q

  clean-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Clean install imports every module
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          python -c "import lightgbm, duckdb, sklearn, pandas, pyarrow"
          python -c "import src.data.mart_loaders, src.data.mart_schemas, src.data.mart_validators"
          python -c "import src.features.features_churn, src.models.train_churn"
