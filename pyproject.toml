[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["notebooks", "analysis_notebooks", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]  # line length handled by the formatter, not enforced as a lint error

[tool.pytest.ini_options]
testpaths = ["tests"]
